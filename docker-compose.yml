services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: voahealth
      POSTGRES_USER: voahealth
      POSTGRES_PASSWORD: voahealth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    environment:
      - DEBUG=1
      - SECRET_KEY=change-me
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - DATABASE_URL=${DATABASE_URL-postgres://voahealth:voahealth@db:5432/voahealth}
      - GEMINI_API_KEY=${GEMINI_API_KEY-}
      - GEMINI_TRANSCRIPTION_MODEL=${GEMINI_TRANSCRIPTION_MODEL-gemini-2.5-flash}
      - GEMINI_WRITER_MODEL=${GEMINI_WRITER_MODEL-gemini-2.5-flash}
      - USE_STUBS=${USE_STUBS-false}
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install --include=dev && npm run build && HOSTNAME=0.0.0.0 node .next/standalone/server.js"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000/api
      - API_INTERNAL_BASE_URL=http://backend:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_venv:
